---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: gateway-api-crds
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            agw-role: leaf
  template:
    metadata:
      name: 'gateway-api-crds-{{name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "1"
    spec:
      project: platform
      source:
        repoURL: https://github.com/kubernetes-sigs/gateway-api.git
        targetRevision: v1.5.0
        path: config/crd/experimental
        directory:
          recurse: true
      destination:
        server: '{{server}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
          - Replace=true
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: istio-base
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            agw-role: leaf
  template:
    metadata:
      name: 'istio-base-{{name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "1"
    spec:
      project: platform
      sources:
        - repoURL: us-docker.pkg.dev/soloio-img/istio-helm
          chart: base
          targetRevision: 1.29.0-solo
          helm:
            valueFiles:
              - $values/helm-apps/istio/base-values.yaml
        - repoURL: https://github.com/ably77/agw-federated-infra.git
          targetRevision: main
          ref: values
      destination:
        server: '{{server}}'
        namespace: istio-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
