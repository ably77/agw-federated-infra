---
# Solo Management UI -- deployed to each leaf cluster in the kagent namespace
# Provides AgentGateway + Mesh product views with ClickHouse telemetry
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: solo-management-ui
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            agw-role: leaf
  template:
    metadata:
      name: 'solo-mgmt-ui-{{name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "9"
    spec:
      project: platform
      sources:
        - repoURL: us-docker.pkg.dev/developers-369321/solo-enterprise-public-nonprod
          chart: management
          targetRevision: 0.3.15-nightly-2026-04-20-680d5f97
          helm:
            valueFiles:
              - $values/helm-apps/solo-management-ui/management-values.yaml
              - $values/helm-apps/solo-management-ui/overlays/{{name}}-management-values.yaml
        - repoURL: https://github.com/ably77/agw-federated-infra.git
          targetRevision: main
          ref: values
      destination:
        server: '{{server}}'
        namespace: kagent
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
