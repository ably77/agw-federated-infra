apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kyverno
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            agw-role: leaf
  template:
    metadata:
      name: 'kyverno-{{name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "7"
    spec:
      project: platform
      ignoreDifferences:
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jqPathExpressions:
            - .metadata.labels
      sources:
        - repoURL: https://kyverno.github.io/kyverno/
          chart: kyverno
          targetRevision: 3.*
          helm:
            valueFiles:
              - $values/helm-apps/kyverno/values.yaml
        - repoURL: https://github.com/ably77/agw-federated-infra.git
          targetRevision: main
          ref: values
      destination:
        server: '{{server}}'
        namespace: kyverno
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
