# Remote peer: leaf-1 reaches leaf-2
# address is injected by install script after east-west gateways are up
remote:
  create: true
  items:
    - name: istio-remote-peer-leaf-2
      cluster: leaf-2
      network: leaf-2
      addressType: IPAddress
      address: "PLACEHOLDER"
      preferredDataplaneServiceType: loadbalancer
      trustDomain: leaf-2.local
